name: Actualizar precios

on:
  schedule:
    - cron: '0 20 * * 5'
    - cron: '0 14 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Descargar precios nuevos
        run: python scraper.py

      - name: Guardar cambios
        run: |
          git config user.name "robot-precios"
          git config user.email "robot@users.noreply.github.com"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "Precios actualizados $(date +%d/%m/%Y)"
            git push
          else
            echo "Sin cambios para guardar"
          fi
