function b64(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
function concat(a,b){const u=new Uint8Array(a.length+b.length);u.set(a);u.set(b,a.length);return u;}
async function derivar(pass){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:b64(SALT_B64),iterations:300000,hash:'SHA-256'},km,256);
  return new Uint8Array(bits);
}
async function abrir(pass,guardar){
  const info=document.getElementById('info'), err=document.getElementById('err');
  err.textContent=''; info.textContent='Abriendo...';
  try{
    const key=await derivar(pass);
    const payload=b64(DATA_B64);
    const ct=payload.slice(0,payload.length-32), mac=payload.slice(payload.length-32);
    const macKeyRaw=await crypto.subtle.digest('SHA-256',concat(key,new TextEncoder().encode('mac')));
    const hk=await crypto.subtle.importKey('raw',macKeyRaw,{name:'HMAC',hash:'SHA-256'},false,['verify']);
    if(!await crypto.subtle.verify('HMAC',hk,mac,ct)) throw new Error('clave');
    const out=new Uint8Array(ct.length);
    for(let i=0;i*32<ct.length;i++){
      const ctr=new Uint8Array(4); new DataView(ctr.buffer).setUint32(0,i);
      const bl=new Uint8Array(await crypto.subtle.digest('SHA-256',concat(key,ctr)));
      const fin=Math.min(32,ct.length-i*32);
      for(let j=0;j<fin;j++) out[i*32+j]=ct[i*32+j]^bl[j];
    }
    const ds=new DecompressionStream('deflate');
    let html=await new Response(new Blob([out]).stream().pipeThrough(ds)).text();
    if(guardar) localStorage.setItem('produsoft_clave',pass);
    html = html.replace('<meta charset="UTF-8">',
      '<meta charset="UTF-8">\n<link rel="manifest" href="manifest.json">\n<link rel="apple-touch-icon" href="icon-192.png">\n<meta name="theme-color" content="#0f172a">');
    html = html.replace('</body>',
      '<scr'+'ipt>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{})}</scr'+'ipt></body>');
    document.open(); document.write(html); document.close();
  }catch(e){
    info.textContent='';
    err.textContent = (e && e.message==='clave') ? 'Clave incorrecta' : 'Error al abrir: '+e;
    localStorage.removeItem('produsoft_clave');
  }
}
document.getElementById('entrar').addEventListener('click',()=>abrir(document.getElementById('clave').value,true));
document.getElementById('clave').addEventListener('keydown',e=>{if(e.key==='Enter')abrir(document.getElementById('clave').value,true);});
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js');}catch(e){}}
const rec=localStorage.getItem('produsoft_clave');
if(rec){document.getElementById('info').textContent='Abriendo...';abrir(rec,false);}
</script>
