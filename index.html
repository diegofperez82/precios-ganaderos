<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2e5d2a">
<title>Precios Ganaderos</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; padding:12px; font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; background:#f6f7f4; color:#1e2a1e; }
  .wrap { max-width:1000px; margin:0 auto; }
  h1 { font-size:19px; margin:0 0 2px; }
  .sub { font-size:12px; color:#5f6b5f; margin-bottom:12px; }
  .card { background:#fff; border:1px solid #e0e5dd; border-radius:12px; padding:14px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .card h2 { font-size:15px; margin:0 0 10px; }
  .chartbox { position:relative; height:300px; }
  select { font-size:14px; padding:6px 10px; border:1px solid #c9d2c6; border-radius:8px; background:#fff; color:inherit; max-width:100%; margin-bottom:6px; }
  .stats { display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 10px; }
  .chip { background:#eef3ec; border-radius:8px; padding:6px 12px; font-size:12px; }
  .chip b { display:block; font-size:17px; }
  .up { color:#1b7f3a; } .down { color:#b3261e; }
  #error { display:none; background:#fdecea; color:#b3261e; border:1px solid #f5c6c2; border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:12px; }
  .src { font-size:11px; color:#8a948a; margin-top:8px; }
  .src a { color:#4a7c46; }
</style>
</head>
<body>
<div class="wrap">
<h1>🐂 Precios Ganaderos</h1>
<div class="sub" id="status">Cargando…</div>
<div id="error"></div>

<div class="card">
  <h2>Terneros por Kg. – Invernada Zona Centro</h2>
  <select id="catSel"></select>
  <div class="stats" id="ternStats"></div>
  <div class="chartbox"><canvas id="ternChart"></canvas></div>
  <div class="src">Fuente: <a href="https://www.elrural.com/mercados/ganadero/invernada-y-cria/invernada-y-cria-zona-centro/zona-centro-terneros-kg/" target="_blank">elrural.com</a> (Canal Rural). Precio promedio con banda mín/máx, $/kg.</div>
</div>

<div class="card">
  <h2>Índice Novillo Arrendamiento (semanal)</h2>
  <div class="stats" id="novStats"></div>
  <div class="chartbox"><canvas id="novChart"></canvas></div>
  <div class="src">Fuentes: <a href="https://www.elrural.com/mercados/ganadero/precios-indicativos/indice-novillo-arrendamiento-precios-indicativos/" target="_blank">elrural.com</a> / <a href="https://www.mercadoagroganadero.com.ar" target="_blank">MAG Cañuelas</a>. Precio promedio operaciones MAG, $/kg.</div>
</div>
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const $ = id => document.getElementById(id);
const fmt = n => n==null ? '–' : n.toLocaleString('es-AR', {maximumFractionDigits:2});
const CAT_KEY = 'pg_cat';
let DATA = null, ternChart = null, novChart = null;

function shortDate(iso){ const [y,m,d] = iso.split('-'); return d + '/' + m + '/' + y.slice(2); }

function pctChip(label, cur, prev){
  let vh = '';
  if (cur != null && prev != null && prev !== 0){
    const p = (cur - prev) / prev * 100;
    vh = '<span class="' + (p >= 0 ? 'up' : 'down') + '">' + (p >= 0 ? '▲ +' : '▼ ') + p.toFixed(1) + '% vs semana anterior</span>';
  }
  return '<div class="chip">' + label + '<b>' + (cur==null ? '–' : '$ ' + fmt(cur)) + '</b>' + vh + '</div>';
}

function render(){
  const tKeys = Object.keys(DATA.terneros).sort();
  const nKeys = Object.keys(DATA.novillo).sort();

  const lastRows = tKeys.length ? DATA.terneros[tKeys[tKeys.length-1]].rows : {};
  const cats = [...new Set([].concat(Object.keys(lastRows), ...tKeys.map(k => Object.keys(DATA.terneros[k].rows))))];
  const sel = $('catSel');
  if (!sel.options.length){
    const prev = localStorage.getItem(CAT_KEY);
    sel.innerHTML = cats.map(c => '<option' + (c === prev ? ' selected' : '') + '>' + c + '</option>').join('');
    sel.onchange = () => { localStorage.setItem(CAT_KEY, sel.value); render(); };
  }
  const cat = sel.value || cats[0];

  const g = k => tKeys.map(d => (DATA.terneros[d].rows[cat] || {})[k] ?? null);
  const prom = g('prom').map(v => v === 0 ? null : v), min = g('min'), max = g('max');

  if (ternChart) ternChart.destroy();
  ternChart = new Chart($('ternChart'), {
    type: 'line',
    data: { labels: tKeys.map(shortDate), datasets: [
      { label:'Mín.', data:min, borderColor:'rgba(74,124,70,0)', backgroundColor:'rgba(74,124,70,.13)', pointRadius:0, fill:false },
      { label:'Máx.', data:max, borderColor:'rgba(74,124,70,0)', backgroundColor:'rgba(74,124,70,.13)', pointRadius:0, fill:'-1' },
      { label:'Promedio', data:prom, borderColor:'#2e5d2a', backgroundColor:'#2e5d2a', pointRadius:3, tension:.25 }
    ]},
    options: { responsive:true, maintainAspectRatio:false, spanGaps:true,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ filter: i => i.text === 'Promedio' } },
        tooltip:{ callbacks:{ label: c => c.dataset.label + ': $ ' + fmt(c.parsed.y) } } },
      scales:{ y:{ ticks:{ callback: v => '$ ' + fmt(v) } } } }
  });
  const pv = prom.filter(v => v != null), lastT = tKeys.length ? DATA.terneros[tKeys[tKeys.length-1]] : null;
  $('ternStats').innerHTML = lastT ? pctChip('Promedio · sem. del ' + lastT.week, pv[pv.length-1], pv[pv.length-2]) : '';

  if (novChart) novChart.destroy();
  novChart = new Chart($('novChart'), {
    type: 'line',
    data: { labels: nKeys.map(shortDate),
      datasets: [{ label:'$ / kg', data: nKeys.map(d => DATA.novillo[d].value), borderColor:'#8a5a2b', backgroundColor:'rgba(138,90,43,.15)', fill:true, pointRadius:3, tension:.25 }] },
    options: { responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: c => '$ ' + fmt(c.parsed.y) } } },
      scales:{ y:{ ticks:{ callback: v => '$ ' + fmt(v) } } } }
  });
  const lastN = nKeys.length ? DATA.novillo[nKeys[nKeys.length-1]] : null;
  const prevN = nKeys.length > 1 ? DATA.novillo[nKeys[nKeys.length-2]] : null;
  $('novStats').innerHTML = lastN ? pctChip('Índice · sem. del ' + lastN.week, lastN.value, prevN ? prevN.value : null) : '';

  $('status').textContent = 'Series semanales · Última actualización: ' + shortDate(DATA.updated);
}

fetch('data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(d => { DATA = d; render(); })
  .catch(e => {
    $('error').style.display = 'block';
    $('error').textContent = 'No se pudieron cargar los datos (' + e.message + '). Probá recargar la página.';
    $('status').textContent = '';
  });
</script>
</body>
</html>
